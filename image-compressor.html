<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Converter</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-primary: #333333;
            --text-secondary: #666666;
            --border-color: #e0e0e0;
            --accent-color: #06b6d4;
            --accent-hover: #0891b2;
            --input-bg: #f9f9f9;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-primary: #e0e0e0;
            --text-secondary: #aaaaaa;
            --border-color: #333333;
            --accent-color: #22d3ee;
            --accent-hover: #67e8f9;
            --input-bg: #2a2a2a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 24px;
        }

        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 25px;
            transition: border-color 0.2s;
        }

        .upload-area:hover {
            border-color: var(--accent-color);
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .setting-group {
            margin-bottom: 15px;
        }

        .setting-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .format-options, .dimension-inputs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .format-btn {
            padding: 6px 14px;
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-primary);
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .format-btn.active {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .dimension-inputs input, .filename-input {
            width: 80px;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--input-bg);
            color: var(--text-primary);
            text-align: center;
            font-size: 14px;
        }

        .filename-input {
            width: 100%;
            text-align: left;
        }
        
        .dimension-inputs input:focus, .filename-input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .dimension-inputs span {
            align-self: center;
            color: var(--text-secondary);
        }

        .filename-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filename-row .ext {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
        }

        .quality-slider {
            width: 100%;
            accent-color: var(--accent-color);
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .preview-area {
            margin-top: 25px;
            display: none;
        }

        .preview-area img {
            max-width: 100%;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        
        .file-list {
            margin-top: 15px;
            font-size: 14px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <button class="theme-toggle" id="themeToggle">Toggle Theme</button>

    <div class="container">
        <h1>Image Converter</h1>
        
        <div class="upload-area" id="uploadArea">
            <p>Drag & Drop Images Here or Click to Browse</p>
            <input type="file" id="fileInput" multiple accept="image/*" hidden>
        </div>
        
        <div class="file-list" id="fileList"></div>

        <div class="settings-grid">
            <div>
                <div class="setting-group">
                    <label>Output Format</label>
                    <div class="format-options">
                        <button class="format-btn" data-format="image/png" data-ext="png">PNG</button>
                        <button class="format-btn" data-format="image/jpeg" data-ext="jpg">JPG</button>
                        <button class="format-btn active" data-format="image/webp" data-ext="webp">WebP</button>
                        <button class="format-btn" data-format="image/gif" data-ext="gif">GIF</button>
                    </div>
                </div>

                <div class="setting-group">
                    <label>Quality (JPG/WebP)</label>
                    <input type="range" min="10" max="100" value="85" class="quality-slider" id="qualitySlider">
                </div>

                <div class="setting-group">
                    <label>File Name</label>
                    <div class="filename-row">
                        <input type="text" class="filename-input" id="filenameInput" value="converted_image" placeholder="Enter file name">
                        <span class="ext" id="fileExt">.webp</span>
                    </div>
                </div>
            </div>

            <div>
                <div class="setting-group">
                    <label>Dimensions (Width × Height)</label>
                    <div class="dimension-inputs">
                        <input type="number" id="widthInput" value="800" min="1" title="Width (px)">
                        <span>×</span>
                        <input type="number" id="heightInput" value="800" min="1" title="Height (px)">
                    </div>
                </div>

                <div class="setting-group">
                    <label>Advanced</label>
                    <div style="font-size: 14px; color: var(--text-secondary);">
                        <label style="font-weight: normal; display: flex; align-items: center; gap: 8px; margin-bottom: 5px;">
                            <input type="checkbox" id="preserveExif"> Preserve EXIF Metadata
                        </label>
                        <label style="font-weight: normal; display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" id="privacyMode"> Privacy Mode (Strip Data)
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <button class="btn-primary" id="convertBtn" disabled>Convert Images</button>

        <div class="preview-area" id="previewArea">
            <h3>Preview</h3>
            <img id="previewImg" src="" alt="Converted Preview">
            <br><br>
            <button class="btn-primary" id="downloadBtn">Download Converted Image</button>
        </div>
    </div>

    <script>
        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            const currentTheme = document.body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', newTheme);
        });

        // Elements
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const widthInput = document.getElementById('widthInput');
        const heightInput = document.getElementById('heightInput');
        const filenameInput = document.getElementById('filenameInput');
        const fileExt = document.getElementById('fileExt');
        const formatBtns = document.querySelectorAll('.format-btn');
        const qualitySlider = document.getElementById('qualitySlider');
        const convertBtn = document.getElementById('convertBtn');
        const previewArea = document.getElementById('previewArea');
        const previewImg = document.getElementById('previewImg');
        const downloadBtn = document.getElementById('downloadBtn');

        let selectedFiles = [];
        let selectedFormat = 'image/webp';
        let currentExt = 'webp';
        let convertedBlobUrl = null;

        // Upload Handling
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.borderColor = 'var(--accent-color)'; });
        uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = 'var(--border-color)'; });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = 'var(--border-color)';
            handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        function handleFiles(files) {
            selectedFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
            fileList.textContent = `${selectedFiles.length} file(s) selected.`;
            convertBtn.disabled = selectedFiles.length === 0;
        }

        // Format Selection
        formatBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                formatBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedFormat = btn.dataset.format;
                currentExt = btn.dataset.ext;
                fileExt.textContent = `.${currentExt}`;
            });
        });

        // Keyboard Input Handling for Width/Height
        [widthInput, heightInput].forEach(input => {
            input.addEventListener('input', () => {
                if (input.value < 1) input.value = 1;
            });
        });

        // Sanitize filename input
        filenameInput.addEventListener('input', () => {
            // Remove invalid characters for filenames
            filenameInput.value = filenameInput.value.replace(/[\\/:*?"<>|]/g, '');
        });

        // Conversion Logic
        convertBtn.addEventListener('click', () => {
            if (selectedFiles.length === 0) return;
            
            const file = selectedFiles[0];
            const reader = new FileReader();
            
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    const targetWidth = parseInt(widthInput.value) || 800;
                    const targetHeight = parseInt(heightInput.value) || 800;
                    
                    canvas.width = targetWidth;
                    canvas.height = targetHeight;
                    
                    ctx.drawImage(img, 0, 0, targetWidth, targetHeight);
                    
                    const quality = qualitySlider.value / 100;
                    
                    canvas.toBlob((blob) => {
                        if (convertedBlobUrl) URL.revokeObjectURL(convertedBlobUrl);
                        convertedBlobUrl = URL.createObjectURL(blob);
                        
                        previewImg.src = convertedBlobUrl;
                        previewArea.style.display = 'block';
                    }, selectedFormat, quality);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // Download Logic
        downloadBtn.addEventListener('click', () => {
            if (!convertedBlobUrl) return;
            const a = document.createElement('a');
            a.href = convertedBlobUrl;
            let name = filenameInput.value.trim() || 'converted_image';
            a.download = `${name}.${currentExt}`;
            a.click();
        });
    </script>
</body>
</html>
