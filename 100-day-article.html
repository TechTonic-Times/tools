    .modal-actions {

</head>

    // ----- LOCAL STORAGE HELPERS -----
    function loadState(key, defaultVal) {
      try {
        const data = localStorage.getItem('tt_' + key);
        if (data) return JSON.parse(data);
      } catch(e) {}
      return defaultVal;
    }

    function saveState(key, val) {
      localStorage.setItem('tt_' + key, JSON.stringify(val));
    }

    // ----- STATE (with localStorage) -----
    let bookmarks = new Set(loadState('bookmarks', []));
    let saved = new Set(loadState('saved', []));
    let completed = new Set(loadState('completed', []));
    let customIdeas = loadState('customIdeas', []);
    let currentFilter = loadState('filter', 'all');

    // ----- DOM refs -----
    const dayGrid = document.getElementById('dayGrid');
    const filterBtns = document.querySelectorAll('.filter-btn');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const bookmarkCountEl = document.getElementById('bookmarkCount');
    const saveCountEl = document.getElementById('saveCount');
    const completedCountEl = document.getElementById('completedCount');
    const bookmarkCountHeader = document.getElementById('bookmarkCountHeader');
    const saveCountHeader = document.getElementById('saveCountHeader');
    const toast = document.getElementById('toast');

    const modalOverlay = document.getElementById('ideaModal');
    const modalDay = document.getElementById('modalDay');
    const modalTopic = document.getElementById('modalTopic');
    const modalAngle = document.getElementById('modalAngle');
    const modalKeywords = document.getElementById('modalKeywords');
    const modalCategory = document.getElementById('modalCategory');
    const modalTitle = document.getElementById('modalTitle');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const submitIdeaBtn = document.getElementById('submitIdeaBtn');
    const openModalBtns = [document.getElementById('openModalBtn'), document.getElementById('openModalBtn2')];

    // ----- helpers -----
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function getItem(day) {
      const base = planData.find(p => p.day === day);
      const custom = customIdeas.find(c => c.day === day);
      if (custom) return { ...base, ...custom, isCustom: true };
      return base ? { ...base, isCustom: false } : null;
    }

    function getAllItems() {
      return planData.map(p => {
        const custom = customIdeas.find(c => c.day === p.day);
        if (custom) return { ...p, ...custom, isCustom: true };
        return { ...p, isCustom: false };
      });
    }

    function getFilteredItems() {
      let items = getAllItems();
      if (currentFilter === 'fresh') {
        items = items.filter(item => !completed.has(item.day));
      } else if (currentFilter === 'used') {
        items = items.filter(item => completed.has(item.day));
      }
      items.sort((a, b) => {
        const aDone = completed.has(a.day);
        const bDone = completed.has(b.day);
        if (aDone && !bDone) return 1;
        if (!aDone && bDone) return -1;
        return a.day - b.day;
      });
      return items;
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        showToast('Copied to clipboard!');
      }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
        showToast('Copied!');
      });
    }

    // ----- PERSISTENCE -----
    function persistAll() {
      saveState('bookmarks', Array.from(bookmarks));
      saveState('saved', Array.from(saved));
      saveState('completed', Array.from(completed));
      saveState('customIdeas', customIdeas);
      saveState('filter', currentFilter);
    }

    // ----- RENDER -----
    function render() {
      const items = getFilteredItems();
      const allDays = planData.length;
      const completedCount = completed.size;

      bookmarkCountEl.textContent = bookmarks.size;
      saveCountEl.textContent = saved.size;
      bookmarkCountHeader.textContent = bookmarks.size;
      saveCountHeader.textContent = saved.size;
      completedCountEl.textContent = `${completedCount}/${allDays}`;

      const pct = Math.min(100, Math.round((completedCount / allDays) * 100));
      progressFill.style.width = pct + '%';
      progressText.textContent = `${completedCount} / ${allDays}`;

      dayGrid.innerHTML = '';
      items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'day-card';
        const isBookmarked = bookmarks.has(item.day);
        const isSaved = saved.has(item.day);
        const isCompleted = completed.has(item.day);

        card.innerHTML = `
          <div class="day-meta">
            <span class="day-number">
              <i class="far fa-calendar-alt"></i> Day ${item.day}
              <input type="checkbox" ${isCompleted ? 'checked' : ''} data-day="${item.day}" class="complete-check" />
            </span>
            <div class="header-icons">
              <button class="icon-btn ${isBookmarked ? 'active' : ''}" data-action="bookmark" data-day="${item.day}" title="Bookmark">
                <svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
              </button>
              <button class="icon-btn ${isSaved ? 'heart-active' : ''}" data-action="save" data-day="${item.day}" title="Bookmarked">
                <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
              </button>
            </div>
          </div>
          <div class="title-row">
            <h3>${item.topic} ${item.isCustom ? '<span style="font-weight:400; color:#1b8f8f; font-size:0.6rem;">✨ custom</span>' : ''}</h3>
            <button class="copy-btn" data-copy="topic" data-day="${item.day}" title="Copy title">
              <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            </button>
          </div>
          <span class="angle">${item.angle || 'Not provided'}</span>
          <div class="keywords-row">
            <span class="keywords"><i class="fas fa-tag"></i> ${item.keywords || 'Not provided'}</span>
            <button class="copy-btn" data-copy="keywords" data-day="${item.day}" title="Copy keywords">
              <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            </button>
          </div>
          <span class="category-tag"><i class="fas fa-folder-open"></i> ${item.category || 'Not provided'}</span>
          <div class="card-actions">
            <button class="edit-btn" data-day="${item.day}"><i class="fas fa-edit"></i> Edit</button>
            <button class="delete-btn" data-day="${item.day}"><i class="fas fa-trash-alt"></i> Delete</button>
          </div>
        `;
        dayGrid.appendChild(card);
      });

      // checkbox
      document.querySelectorAll('.complete-check').forEach(cb => {
        cb.addEventListener('change', function() {
          const day = parseInt(this.dataset.day);
          if (this.checked) completed.add(day);
          else completed.delete(day);
          persistAll();
          render();
        });
      });

      // bookmark & save
      document.querySelectorAll('.header-icons .icon-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          const action = this.dataset.action;
          const day = parseInt(this.dataset.day);
          if (action === 'bookmark') {
            if (bookmarks.has(day)) bookmarks.delete(day);
            else bookmarks.add(day);
            persistAll();
            render();
          } else if (action === 'save') {
            if (saved.has(day)) saved.delete(day);
            else saved.add(day);
            persistAll();
            render();
          }
        });
      });

      // copy
      document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          const day = parseInt(this.dataset.day);
          const type = this.dataset.copy;
          const item = getItem(day);
          if (!item) return;
          let text = type === 'topic' ? item.topic : item.keywords;
          if (text) copyToClipboard(text);
        });
      });

      // edit & delete
      document.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const day = parseInt(this.dataset.day);
          openEditModal(day);
        });
      });
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const day = parseInt(this.dataset.day);
          if (confirm(`Delete custom idea for Day ${day}?`)) {
            customIdeas = customIdeas.filter(c => c.day !== day);
            persistAll();
            render();
            showToast('Deleted!');
          }
        });
      });
    }

    // ----- MODAL -----
    function openModal(day = null) {
      modalOverlay.classList.add('active');
      if (day) {
        editingDay = day;
        modalTitle.innerHTML = '<i class="fas fa-edit"></i> Edit idea';
        const item = getItem(day);
        if (item) {
          modalDay.value = item.day;
          modalDay.disabled = true;
          modalTopic.value = item.topic || '';
          modalAngle.value = item.angle || '';
          modalKeywords.value = item.keywords || '';
          modalCategory.value = item.category || 'AI';
        }
      } else {
        editingDay = null;
        modalTitle.innerHTML = '<i class="fas fa-pen-fancy"></i> Add custom idea';
        modalDay.disabled = false;
        modalDay.value = '';
        modalTopic.value = '';
        modalAngle.value = '';
        modalKeywords.value = '';
        modalCategory.value = 'AI';
      }
    }

    let editingDay = null;
    function openEditModal(day) { openModal(day); }
    function closeModal() {
      modalOverlay.classList.remove('active');
      modalDay.disabled = false;
      editingDay = null;
    }

    openModalBtns.forEach(btn => btn.addEventListener('click', () => openModal()));
    closeModalBtn.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    submitIdeaBtn.addEventListener('click', function() {
      const day = parseInt(modalDay.value);
      const topic = modalTopic.value.trim();
      const angle = modalAngle.value.trim() || 'Not provided';
      const keywords = modalKeywords.value.trim() || 'Not provided';
      const category = modalCategory.value || 'Not provided';

      if (!day || day < 1 || day > 100) { alert('Please enter a valid day (1-100)'); return; }
      if (!topic) { alert('Please enter a topic'); return; }

      if (editingDay !== null) {
        customIdeas = customIdeas.filter(c => c.day !== editingDay);
      }
      customIdeas.push({ day, topic, angle, keywords, category });
      persistAll();
      closeModal();
      render();
      showToast('Idea saved!');
    });

    // ----- FILTER -----
    filterBtns.forEach(btn => {
      btn.addEventListener('click', function() {
        filterBtns.forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentFilter = this.dataset.filter;
        persistAll();
        render();
      });
    });

    // set active filter on load
    filterBtns.forEach(btn => {
      if (btn.dataset.filter === currentFilter) btn.classList.add('active');
    });

    // ----- INIT -----
    render();
  })();
</script>
